name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agentkit
          POSTGRES_PASSWORD: agentkit
          POSTGRES_DB: agentkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentkit -d agentkit"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://agentkit:agentkit@localhost:5432/agentkit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # A venv named "venv" so the [tool.pyright] venv config resolves the same as locally.
      - name: Install
        run: |
          python -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -e ".[dev]"

      - name: Lint (ruff)
        run: venv/bin/ruff check .

      - name: Type check (pyright)
        run: venv/bin/pyright

      - name: Tests (pytest)
        run: venv/bin/pytest -q

      - name: Eval gate
        # Deterministic StubChat -> no API key needed. Fails the build on metric regressions.
        run: venv/bin/python -m agentkit.eval.runner
